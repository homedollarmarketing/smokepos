<div class="page centered-layout">
  <div class="header-container">
    <app-page-header
      [title]="isEditMode ? 'Edit Branch' : 'Create Branch'"
      [subtitle]="isEditMode ? 'Update branch details' : 'Add a new branch location'"
      [showBackButton]="true"
    ></app-page-header>
  </div>

  <div class="card form-container">
    <form [formGroup]="branchForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name *</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="e.g. Downtown Branch"
          [class.error]="hasError('name')"
        />
        <div class="error-msg" *ngIf="hasError('name')">Name is required</div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea
          id="address"
          formControlName="address"
          placeholder="Branch address..."
          rows="3"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input
          id="phoneNumber"
          type="text"
          formControlName="phoneNumber"
          placeholder="e.g. +256 700 000 000"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="e.g. branch@example.com"
          [class.error]="hasError('email')"
        />
        <div class="error-msg" *ngIf="hasError('email')">Enter a valid email address</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="accentColor">Accent Color</label>
          <input id="accentColor" type="color" formControlName="accentColor" class="color-input" />
        </div>

        <div class="form-group">
          <label for="txtOnAccentColor">Text on Accent Color</label>
          <input
            id="txtOnAccentColor"
            type="color"
            formControlName="txtOnAccentColor"
            class="color-input"
          />
        </div>
      </div>

      <div class="form-group checkbox">
        <label>
          <input type="checkbox" formControlName="isActive" />
          Active
        </label>
      </div>

      <div class="form-group checkbox">
        <label>
          <input type="checkbox" formControlName="isMain" />
          Main Branch
        </label>
        <span class="hint">Only one branch can be the main branch.</span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-save" [disabled]="branchForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Save Branch' }}
        </button>
      </div>
    </form>
  </div>
</div>
