<div class="brands-page">
    <app-page-header title="Brands" subtitle="Manage product brands and manufacturers" [showAddButton]="true"
        addButtonLabel="Add Brand" (addClick)="onCreate()"></app-page-header>

    <!-- Search Bar -->
    <div class="search-bar">
        <div class="search-box">
            <i class="pi pi-search"></i>
            <input type="text" placeholder="Search brands..." [ngModel]="searchTerm()"
                (ngModelChange)="onSearchChange($event)" />
        </div>
    </div>

    <!-- Error Message -->
    @if (error()) {
    <div class="error-banner">
        <i class="pi pi-exclamation-circle"></i>
        <span>{{ error() }}</span>
    </div>
    }

    <!-- Data Table -->
    <div class="card">
        <p-table [value]="brands()" [loading]="isLoading()" selectionMode="single" (onRowSelect)="onRowClick($event)">
            <ng-template pTemplate="header">
                <tr>
                    <th>Brand</th>
                    <th>Description</th>
                    <th>Status</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-brand>
                <tr [pSelectableRow]="brand" class="clickable-row">
                    <td>
                        <div class="brand-info">
                            <img [src]="brand.logoUrl || 'assets/placeholder.png'" [alt]="brand.name"
                                class="brand-logo" />
                            <span class="brand-name">{{ brand.name }}</span>
                        </div>
                    </td>
                    <td>{{ brand.description || '-' }}</td>
                    <td>
                        <p-tag [severity]="brand.isActive ? 'success' : 'danger'"
                            [value]="brand.isActive ? 'Active' : 'Inactive'"></p-tag>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="3" class="empty-message">
                        No brands found. Try adjusting your search or add your first brand.
                    </td>
                </tr>
            </ng-template>
        </p-table>

        <!-- Pagination -->
        <div class="pagination">
            <button pButton label="Prev" icon="pi pi-chevron-left" class="p-button-outlined p-button-sm"
                [disabled]="!canGoPrev()" (click)="onPrevPage()"></button>
            <span class="page-info">
                Page {{ pagination().page }} of {{ pagination().totalPages }}
            </span>
            <button pButton label="Next" icon="pi pi-chevron-right" iconPos="right"
                class="p-button-outlined p-button-sm" [disabled]="!canGoNext()" (click)="onNextPage()"></button>
        </div>
    </div>
</div>
