<div class="page" *ngIf="brand">
    <app-page-header [title]="brand.name" subtitle="Brand Details" [showBackButton]="true"></app-page-header>

    <div class="card details-container">
        <div class="header-section">
            <img [src]="brand.logoUrl || 'assets/placeholder.png'" alt="Brand Logo" class="brand-logo" />
            <div class="status-badge" [class.active]="brand.isActive">
                {{ brand.isActive ? 'Active' : 'Inactive' }}
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="label">Description</span>
                <p>{{ brand.description || 'No description provided.' }}</p>
            </div>

            <div class="info-item">
                <span class="label">Created At</span>
                <p>{{ brand.createdAt | date:'medium' }}</p>
            </div>

            <div class="info-item">
                <span class="label">Updated At</span>
                <p>{{ brand.updatedAt | date:'medium' }}</p>
            </div>
        </div>

        <div class="actions">
            <button pButton label="Delete" icon="pi pi-trash" class="p-button-outlined p-button-danger"
                (click)="confirmDelete()" [loading]="isDeleting"></button>
            <a [routerLink]="['/brands', brand.id, 'edit']" class="btn-edit">Edit Brand</a>
        </div>
    </div>
</div>

<p-confirmDialog></p-confirmDialog>
