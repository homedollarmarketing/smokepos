<div class="page centered-layout">
    <div class="header-container">
        <app-page-header [title]="isEditMode ? 'Edit Brand' : 'Create Brand'"
            [subtitle]="isEditMode ? 'Update brand details' : 'Add a new brand to the catalog'"
            [showBackButton]="true"></app-page-header>
    </div>

    <div class="card form-container">
        <form [formGroup]="brandForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Name *</label>
                <input id="name" type="text" formControlName="name" placeholder="e.g. Toyota"
                    [class.error]="hasError('name')" />
                <div class="error-msg" *ngIf="hasError('name')">Name is required</div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Brand description..."
                    rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="logo">Logo</label>
                <input id="logo" type="file" (change)="onFileSelect($event)" accept="image/*" />
                <div class="preview-container" *ngIf="previewUrl">
                    <img [src]="previewUrl" alt="Logo Preview" class="img-preview" />
                </div>
                <div *ngIf="isEditMode && !previewUrl && currentLogoUrl" class="preview-container">
                    <img [src]="currentLogoUrl" alt="Current Logo" class="img-preview" />
                    <p class="hint">Current Logo</p>
                </div>
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" formControlName="isActive" />
                    Active
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
                <button type="submit" class="btn-save" [disabled]="brandForm.invalid || isSubmitting">
                    {{ isSubmitting ? 'Saving...' : 'Save Brand' }}
                </button>
            </div>
        </form>
    </div>
</div>
