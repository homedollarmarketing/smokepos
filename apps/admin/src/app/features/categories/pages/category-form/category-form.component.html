<div class="page centered-layout">
    <div class="header-container">
        <app-page-header [title]="isEditMode ? 'Edit Category' : 'Create Category'"
            [subtitle]="isEditMode ? 'Update category details' : 'Add a new category to the catalog'"
            [showBackButton]="true"></app-page-header>
    </div>

    <div class="card form-container">
        <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Name *</label>
                <input id="name" type="text" formControlName="name" placeholder="e.g. Engine Parts"
                    [class.error]="hasError('name')" />
                <div class="error-msg" *ngIf="hasError('name')">Name is required</div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" formControlName="description" placeholder="Category description..."
                    rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="image">Category Image</label>
                <input id="image" type="file" (change)="onFileSelect($event)" accept="image/*" />
                <div class="preview-container" *ngIf="previewUrl">
                    <img [src]="previewUrl" alt="Preview" class="img-preview" />
                </div>
                <div *ngIf="isEditMode && !previewUrl && currentImageUrl" class="preview-container">
                    <img [src]="currentImageUrl" alt="Current Image" class="img-preview" />
                    <p class="hint">Current Image</p>
                </div>
            </div>

            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" formControlName="isActive" />
                    Active
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
                <button type="submit" class="btn-save" [disabled]="categoryForm.invalid || isSubmitting">
                    {{ isSubmitting ? 'Saving...' : 'Save Category' }}
                </button>
            </div>
        </form>
    </div>
</div>
