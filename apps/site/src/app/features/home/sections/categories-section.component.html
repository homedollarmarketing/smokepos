<section class="categories-section">
    <div class="container">
        <div class="categories-slider">
            <button class="slider-arrow prev" (click)="scrollLeft()" aria-label="Previous">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>

            <div class="categories-track" #categoriesTrack>
                @for (category of categories(); track category.id) {
                <a [routerLink]="['/store']" [queryParams]="{category: category.slug}" class="category-card">
                    <div class="category-image">
                        @if (category.image) {
                        <img [src]="category.image" [alt]="category.name">
                        } @else {
                        <div class="placeholder-image">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                            </svg>
                        </div>
                        }
                    </div>
                    <span class="category-name">{{ category.name | uppercase }}</span>
                </a>
                }

                @if (isLoading()) {
                @for (i of [1,2,3,4]; track i) {
                <div class="category-card skeleton">
                    <div class="category-image skeleton-circle"></div>
                    <span class="category-name skeleton-text"></span>
                </div>
                }
                }
            </div>

            <button class="slider-arrow next" (click)="scrollRight()" aria-label="Next">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </div>

        <div class="view-all-wrapper">
            <a routerLink="/store" class="btn-view-all">View All Categories</a>
        </div>
    </div>
</section>
